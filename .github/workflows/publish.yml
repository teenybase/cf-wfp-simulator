name: publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm provenance via OIDC
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm test
        env:
          CI: '1'

      # Trusted Publishing — no NPM_TOKEN needed.
      # Configure once at https://www.npmjs.com/package/cf-wfp-simulator/access
      # → "Trusted Publisher" → GitHub Actions, repo `teenybase/cf-wfp-simulator`,
      # workflow `.github/workflows/publish.yml`, environment (none).
      - run: npm publish --provenance --access public
